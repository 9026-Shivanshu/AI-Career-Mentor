<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | AI Career Mentor</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/register.css">
</head>

<body>

    <div class="register-container">

        <!-- Left Side -->

        <div class="left-panel">

            <h1>AI Career Mentor</h1>

            <p>

                Build your career with AI-powered Resume Analysis,
                ATS Score, Mock Interviews and Career Roadmaps.

            </p>

            <img src="assets/images/hero.png" alt="Register">

        </div>

        <!-- Right Side -->

        <div class="right-panel">

            <h2>Create Account</h2>

            <p>Start your placement journey today.</p>

            <form id="registerForm">

                <div class="input-box">

                    <i class="fa-solid fa-user"></i>

                    <input
                        type="text"
                        id="fullName"
                        placeholder="Full Name"
                        required>

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-envelope"></i>

                    <input
                        type="email"
                        id="email"
                        placeholder="Email Address"
                        required>

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-phone"></i>

                    <input
                        type="text"
                        id="phone"
                        placeholder="Phone Number"
                        required>

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-building-columns"></i>

                    <input
                        type="text"
                        id="college"
                        placeholder="College Name"
                        required>

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-code"></i>

                    <input
                        type="text"
                        id="branch"
                        placeholder="Branch"
                        required>

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-calendar"></i>

                    <input
                        type="number"
                        id="graduationYear"
                        placeholder="Graduation Year"
                        required>

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input
                        type="password"
                        id="password"
                        placeholder="Password"
                        required>

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Confirm Password"
                        required>

                </div>

                <button type="submit">

                    Create Account

                </button>

            </form>

            <div class="login-link">

                Already have an account?

                <a href="login.html">

                    Login

                </a>

            </div>

        </div>

    </div>

    <script src="js/register.js"></script>

</body>

</html>
